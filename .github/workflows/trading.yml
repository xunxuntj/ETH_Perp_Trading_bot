name: ETH Trading Monitor

# ⚠️ 重要提示：GitHub Actions 的 schedule 不可靠！
# 问题：
# 1. 实际执行频率远低于 cron 设置（可能每小时才运行1次）
# 2. 有延迟（几分钟到几小时）
# 3. 高峰时段可能跳过执行
# 
# 解决方案：
# - 使用外部 cron 服务（cron-job.org）触发 repository_dispatch
# - 或部署到 VPS/云服务使用标准 cron
# - 详见：EXTERNAL_SCHEDULING_GUIDE.md
#
# 当前 schedule 仅作为兜底备份，不保证准时执行

on:
  schedule:
    # 每5分钟运行（错峰3分钟）：03,08,13,18,23,28,33,38,43,48,53,58
    # 注意：实际可能每小时才运行1次！
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  repository_dispatch:
    types: [trading-check]  # 外部触发入口（推荐）
  workflow_dispatch:  # 手动触发

env:
  TZ: UTC

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download state
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从 artifact 下载上次的状态
          gh run download --name trading-state --dir . 2>/dev/null || echo '{"direction":"none","entry_price":0}' > trading_state.json
          echo "📂 State file:"
          cat trading_state.json
      
      - name: Run trading check
        env:
          # API 凭证 (必需)
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
          GATE_API_SECRET: ${{ secrets.GATE_API_SECRET }}
          ENABLE_AUTO_TRADING: ${{ secrets.ENABLE_AUTO_TRADING || vars.ENABLE_AUTO_TRADING }}
          
          # Telegram 通知 (可选)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # 风险管理配置 (可选，使用默认值)
          RISK_MODE: 'fixed'                  # "fixed" 或 "percent"
          RISK_FIXED_AMOUNT: '10'             # 单笔风险金额 (USDT)
          RISK_PERCENT: '0.02'                # 风险百分比 (2%)
          LOCK_PROFIT_BUFFER: '1'             # 锁利期保底盈利 (USDT)
          
          # 状态文件配置 (可选)
          STATE_FILE: 'trading_state.json'    # 持仓状态文件
          
          # 调试配置 (可选，生产环境改为 '0')
          GATE_DEBUG: '0'                     # Gate API 请求/响应日志
          DEBUG: '0'                          # 策略计算日志
        run: python main.py
      
      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-state
          path: trading_state.json
          retention-days: 30
          overwrite: true
