name: ETH Trading Monitor

on:
  schedule:
    # 每30分钟运行 (整点和半点)
    - cron: '0,30 * * * *'
  workflow_dispatch:  # 手动触发

env:
  TZ: UTC

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download state
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从 artifact 下载上次的状态
          gh run download --name trading-state --dir . 2>/dev/null || echo '{"direction":"none","entry_price":0}' > trading_state.json
          echo "📂 State file:"
          cat trading_state.json
      
      - name: Run trading check
        env:
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
          GATE_API_SECRET: ${{ secrets.GATE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      
      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-state
          path: trading_state.json
          retention-days: 30
          overwrite: true
