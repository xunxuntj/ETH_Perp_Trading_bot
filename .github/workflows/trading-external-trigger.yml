name: ETH Trading Monitor (External Trigger)

# 本 workflow 只接受外部触发，不使用 schedule
# 推荐使用 cron-job.org 或其他外部 cron 服务来触发
on:
  repository_dispatch:
    types: [trading-check]
  workflow_dispatch:  # 手动触发

env:
  TZ: UTC
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        symbol: [BTC_USDT, ETH_USDT]
    
    steps:
      - name: Checkpoint
        uses: actions/checkout@v6
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download state
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从 artifact 下载上次的状态，使用与 symbol 关联的名称
          gh run download --name trading-state-${{ matrix.symbol }} --dir . 2>/dev/null || echo '{"direction":"none","entry_price":0}' > trading_state_${{ matrix.symbol }}.json
          # 复制为当前运行脚本读取的默认状态文件名
          cp trading_state_${{ matrix.symbol }}.json trading_state.json 2>/dev/null || true
          echo "📂 State file for ${{ matrix.symbol }}:"
          cat trading_state.json
      
      - name: Run trading check
        env:
          # API 凭证 (必需)
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
          GATE_API_SECRET: ${{ secrets.GATE_API_SECRET }}
          ENABLE_AUTO_TRADING: ${{ secrets.ENABLE_AUTO_TRADING || vars.ENABLE_AUTO_TRADING }}
          
          # 交易对配置
          SYMBOL: ${{ matrix.symbol }}
          
          # Telegram 通知 (可选)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # 风险管理配置 (优先从 GitHub secrets/vars 获取，其次使用默认值)
          RISK_MODE: ${{ secrets.RISK_MODE || vars.RISK_MODE || 'fixed' }}
          RISK_FIXED_AMOUNT: ${{ secrets.RISK_FIXED_AMOUNT || vars.RISK_FIXED_AMOUNT || '5' }}
          RISK_PERCENT: ${{ secrets.RISK_PERCENT || vars.RISK_PERCENT || '0.02' }}
          CIRCUIT_BREAKER_EQUITY: ${{ secrets.CIRCUIT_BREAKER_EQUITY || vars.CIRCUIT_BREAKER_EQUITY || '450' }}
          LOCK_PROFIT_BUFFER: ${{ secrets.LOCK_PROFIT_BUFFER || vars.LOCK_PROFIT_BUFFER || '0.5' }}
          MAX_CONSECUTIVE_LOSSES: ${{ secrets.MAX_CONSECUTIVE_LOSSES || vars.MAX_CONSECUTIVE_LOSSES || '3' }}
          
          # 交易执行配置
          AUTO_SET_STOP_LOSS: ${{ secrets.AUTO_SET_STOP_LOSS || vars.AUTO_SET_STOP_LOSS || 'true' }}
          STOP_LOSS_MODE: ${{ secrets.STOP_LOSS_MODE || vars.STOP_LOSS_MODE || 'tight_only' }}
          CLOSE_MODE: ${{ secrets.CLOSE_MODE || vars.CLOSE_MODE || 'market' }}
          NOTIFY_DETAILS: ${{ secrets.NOTIFY_DETAILS || vars.NOTIFY_DETAILS || 'true' }}
          SIGNAL_NOTIFY_MODE: ${{ secrets.SIGNAL_NOTIFY_MODE || vars.SIGNAL_NOTIFY_MODE || 'operation' }}
          
          # 状态文件配置
          STATE_FILE: trading_state_${{ matrix.symbol }}.json
          
          # 调试配置
          GATE_DEBUG: ${{ secrets.GATE_DEBUG || vars.GATE_DEBUG || '0' }}
          DEBUG: ${{ secrets.DEBUG || vars.DEBUG || '0' }}
        run: python main.py
      
      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trading-state-${{ matrix.symbol }}
          path: |
            trading_state_${{ matrix.symbol }}.json
            trading_state.json
            position_state.json
            position_state_*.json
            cooldown_state.json
            cooldown_state_*.json
            cooldown_notify_state.json
            cooldown_notify_state_*.json
          if-no-files-found: ignore
          retention-days: 30
          overwrite: true
